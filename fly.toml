# Fly.io configuration — deploy with `fly deploy` from the repo root.
app = "gjs-meiden"
primary_region = "ams"
swap_size_mb = 512

[[mounts]]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero when idle: the machine stops when nobody is connected and
  # cold-starts in a few seconds on the next request. Keeps the bill near zero.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
